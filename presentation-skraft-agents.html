<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SKRAFT - Agents SDLC</title>
  <style>
    :root {
      --bg-0: #060b17;
      --bg-1: #0d1730;
      --panel: rgba(13, 24, 49, 0.88);
      --line: rgba(120, 190, 255, 0.18);
      --txt: #edf4ff;
      --muted: #a9bbd8;
      --accent: #56b6ff;
      --accent-2: #7ef0c8;
      --ok: #66d38f;
      --warn: #ffc766;
      --danger: #ff8a8a;
      --fs-chip: clamp(0.66rem, 1vw, 0.82rem);
      --fs-title: clamp(1.7rem, 4.5vw, 3.4rem);
      --fs-subtitle: clamp(0.95rem, 1.6vw, 1.2rem);
      --fs-panel-head: 0.73rem;
      --fs-body: clamp(0.82rem, 1.25vw, 1.02rem);
      --fs-label: 0.68rem;
      --fs-badge: 0.68rem;
      --fs-gate-text: clamp(0.78rem, 1.07vw, 0.95rem);
      --fs-gate-meta: 0.62rem;
      --fs-arrow: 1rem;
      --fs-footer: 0.76rem;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 0%, #142a55 0%, var(--bg-0) 45%), var(--bg-0);
      color: var(--txt);
      overflow: hidden;
      font-family: "Space Grotesk", "Avenir Next", "Segoe UI", sans-serif;
    }

    .deck {
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: clamp(0.8rem, 2vw, 1.4rem);
      padding: clamp(0.9rem, 2.8vw, 2rem);
      opacity: 0;
      transform: translateX(18px);
      pointer-events: none;
      transition: opacity 260ms ease, transform 260ms ease;
      background:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        radial-gradient(circle at 85% 12%, rgba(86, 182, 255, 0.15), transparent 40%);
      background-size: 42px 42px, 42px 42px, auto;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }

    .left, .right {
      min-height: 0;
      display: grid;
      gap: clamp(0.6rem, 1.5vw, 1rem);
      align-content: start;
    }

    .chip {
      justify-self: start;
      display: inline-flex;
      gap: 0.45rem;
      align-items: center;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(126, 240, 200, 0.35);
      background: rgba(126, 240, 200, 0.08);
      color: var(--accent-2);
      font-size: var(--fs-chip);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: var(--fs-title);
      line-height: 0.95;
      letter-spacing: -0.03em;
      max-width: 14ch;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: var(--fs-subtitle);
      max-width: 48ch;
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(86, 182, 255, 0.24);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.34);
    }

    .panel .head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      padding: 0.72rem 0.95rem;
      border-bottom: 1px solid rgba(86, 182, 255, 0.16);
      font-size: var(--fs-panel-head);
      letter-spacing: 0.11em;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
    }

    .panel .body {
      padding: 0.85rem 0.95rem 0.95rem;
    }

    ul {
      margin: 0;
      padding-left: 1.08rem;
      display: grid;
      gap: 0.45rem;
      color: var(--txt);
      font-size: var(--fs-body);
      line-height: 1.45;
    }

    .schema {
      display: grid;
      gap: 0.55rem;
    }

    .box {
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      padding: 0.62rem 0.72rem;
    }

    .box .k {
      display: block;
      color: var(--accent-2);
      font-size: var(--fs-label);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.18rem;
      font-weight: 700;
    }

    .box .v {
      font-size: var(--fs-body);
      line-height: 1.4;
      color: var(--txt);
    }

    .arrow {
      justify-self: center;
      color: var(--accent);
      font-size: var(--fs-arrow);
      line-height: 1;
      opacity: 0.9;
    }

    .legend {
      margin-top: 0.3rem;
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
    }

    .badge {
      font-size: var(--fs-badge);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 999px;
      padding: 0.22rem 0.6rem;
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
    }

    .badge.ok { color: var(--ok); border-color: rgba(102, 211, 143, 0.5); }
    .badge.warn { color: var(--warn); border-color: rgba(255, 199, 102, 0.5); }

    .gate-list {
      display: grid;
      gap: 0.42rem;
    }

    .gate-list--dense-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.36rem;
    }

    .gate-list--dense-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.34rem;
    }

    .gate-item {
      display: grid;
      grid-template-columns: 3.1rem 1fr;
      gap: 0.55rem;
      align-items: start;
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 10px;
      padding: 0.5rem 0.58rem;
      background: rgba(255, 255, 255, 0.03);
    }

    .gate-id {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      border-radius: 999px;
      border: 1px solid rgba(126, 240, 200, 0.35);
      color: var(--accent-2);
      font-size: var(--fs-label);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.18rem 0.4rem;
      background: rgba(126, 240, 200, 0.08);
      line-height: 1;
    }

    .gate-text {
      font-size: var(--fs-gate-text);
      line-height: 1.35;
      color: var(--txt);
    }

    .gate-meta {
      margin-top: 0.2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.28rem;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      padding: 0.12rem 0.44rem;
      font-size: var(--fs-gate-meta);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.04);
    }

    .gate-meta.blocker {
      color: var(--danger);
      border-color: rgba(255, 138, 138, 0.5);
      background: rgba(255, 138, 138, 0.08);
    }

    .gate-meta.non-blocker {
      color: var(--ok);
      border-color: rgba(102, 211, 143, 0.5);
      background: rgba(102, 211, 143, 0.08);
    }

    .slide.has-gates {
      grid-template-columns: 1fr;
      align-content: start;
      gap: clamp(0.6rem, 1.4vw, 1rem);
    }

    .gate-slide {
      min-height: 0;
      display: grid;
      gap: clamp(0.52rem, 1.12vw, 0.82rem);
      align-content: start;
    }

    .gate-header {
      display: grid;
      grid-template-columns: 1.06fr 0.94fr;
      gap: clamp(0.52rem, 1.12vw, 0.82rem);
      min-height: 0;
    }

    .gate-title {
      min-height: 0;
      display: grid;
      gap: 0.38rem;
      align-content: start;
    }

    .gate-body {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: clamp(0.52rem, 1.12vw, 0.82rem);
      min-height: 0;
    }

    .gate-center,
    .gate-full,
    .gate-header .panel {
      min-height: 0;
    }

    .slide.has-gates h1 {
      max-width: 22ch;
      line-height: 0.96;
    }

    .slide.has-gates .subtitle {
      max-width: 70ch;
    }

    .slide.has-gates .panel .head {
      padding: 0.52rem 0.66rem;
      letter-spacing: 0.08em;
    }

    .slide.has-gates .panel .body {
      padding: 0.56rem 0.66rem 0.64rem;
    }

    .slide.has-gates ul {
      gap: 0.28rem;
      line-height: 1.28;
      padding-left: 0.96rem;
    }

    .slide.has-gates .legend {
      margin-top: 0.18rem;
      gap: 0.28rem;
    }

    .slide.has-gates .badge {
      padding: 0.16rem 0.4rem;
      letter-spacing: 0.06em;
    }

    .slide.has-gates .schema {
      gap: 0.3rem;
    }

    .slide.has-gates .box {
      padding: 0.35rem 0.42rem;
      border-radius: 9px;
    }

    .slide.has-gates .box .k {
      margin-bottom: 0.06rem;
      letter-spacing: 0.08em;
    }

    .slide.has-gates .box .v {
      line-height: 1.18;
    }

    .slide.has-gates .gate-item {
      grid-template-columns: 2.3rem 1fr;
      gap: 0.36rem;
      padding: 0.31rem 0.38rem;
      border-radius: 8px;
    }

    .slide.has-gates .gate-id {
      padding: 0.1rem 0.26rem;
      letter-spacing: 0.05em;
    }

    .slide.has-gates .gate-text {
      line-height: 1.15;
    }

    .slide.has-gates .gate-meta {
      margin-top: 0.14rem;
      padding: 0.09rem 0.36rem;
      letter-spacing: 0.06em;
    }

    .footer {
      position: absolute;
      left: 1rem;
      right: 1rem;
      bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      gap: 0.7rem;
      color: var(--muted);
      font-size: var(--fs-footer);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .dock {
      position: fixed;
      left: 1rem;
      right: 1rem;
      bottom: 1rem;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(86, 182, 255, 0.28);
      background: rgba(7, 13, 26, 0.78);
      backdrop-filter: blur(8px);
      padding: 0.45rem 0.75rem;
    }

    .dock .title {
      color: var(--accent-2);
      font-weight: 700;
      font-size: var(--fs-body);
      letter-spacing: 0.03em;
    }

    .dock .hint {
      color: var(--muted);
      font-size: var(--fs-footer);
    }

    .dots {
      display: flex;
      gap: 0.35rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      transition: transform 180ms ease, background 180ms ease;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.22);
    }

    @media (max-width: 980px) {
      .slide {
        grid-template-columns: 1fr;
        overflow-y: auto;
      }

      .slide.has-gates {
        grid-template-columns: 1fr;
      }

      .gate-header {
        grid-template-columns: 1fr;
      }

      .gate-body {
        grid-template-columns: 1fr;
      }

      .gate-list--dense-2,
      .gate-list--dense-3 {
        grid-template-columns: 1fr;
      }

      .footer {
        position: static;
        margin-top: 0.2rem;
      }

      .dock {
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="deck" id="deck"></main>

  <div class="dock" aria-live="polite">
    <div>
      <div class="title">SKRAFT Agents Deck</div>
      <div class="hint">Fleches, Espace, molette, swipe</div>
    </div>
    <div class="dots" id="dots"></div>
    <div class="hint" id="counter">1 / 1</div>
  </div>

  <script>
    const slides = [
      {
        phase: "Overview",
        title: "Pipeline SDLC - Agents et déclenchements",
        subtitle: "Chaque slide montre un agent (ou lens), ce qu'il fait, ce qui le déclenche, et ce qu'il déclenche ensuite.",
        role: [
          "Point d'entree unique: /sdlc",
          "Pipeline stateful: state.md pilote la reprise",
          "Boucle stricte: specialist -> reviewer -> verdict"
        ],
        trigger: "Utilisateur lance /sdlc",
        does: "L'orchestrateur route la phase courante",
        output: "Dispatch specialist + reviewer + update state",
        next: "Phase suivante ou escalade"
      },
      {
        phase: "DISCOVER",
        title: "Agent backlog-discoverer",
        subtitle: "Detecte, trie, priorise les issues du backlog.",
        role: [
          "Selection du mode: user-assigned, artifact-driven, search",
          "Triage labels type/priority/effort",
          "Proposition de sprint capacitaire"
        ],
        trigger: "Orchestrateur entre en phase DISCOVER",
        does: "Produit triage-{date}.md et sprint-proposal.md",
        output: "Artefacts DISCOVER complets",
        next: "Declenche backlog-discoverer-reviewer"
      },
      {
        phase: "DISCOVER",
        title: "Agent backlog-discoverer-reviewer",
        subtitle: "Audite la qualite du triage et des priorites.",
        role: [
          "Lens completude (P0/P1)",
          "Lens priorisation/capacite",
          "Lens deduplication"
        ],
        trigger: "Reception des artefacts DISCOVER",
        does: "Applique gates de discovery-review-criteria",
        output: "Verdict approved / changes_requested / rejected",
        next: "Orchestrateur boucle ou avance"
      },
      {
        phase: "DISCUSS",
        title: "Agent backlog-planner",
        subtitle: "Transforme les issues en stories prêtes pour DESIGN.",
        role: [
          "Reecriture user story (INVEST)",
          "AC Given/When/Then",
          "DoR gate et plan sprint"
        ],
        trigger: "DISCOVER approuve",
        does: "Produit stories-{milestone}.md + ac-draft-{story}.md",
        output: "Backlog raffine et tracable",
        next: "Declenche backlog-planner-reviewer"
      },
      {
        phase: "DISCUSS",
        title: "Agent backlog-planner-reviewer",
        subtitle: "Verifie qualite planning et readiness des stories.",
        role: [
          "Lenses INVEST, AC, coherence planning",
          "Validation dependencies DAG",
          "Validation DoR et antipatterns"
        ],
        trigger: "Reception des artefacts DISCUSS",
        does: "Evalue gates G1-G8",
        output: "Verdict structure avec findings",
        next: "Orchestrateur boucle ou avance"
      },
      {
        phase: "DESIGN",
        title: "Agent solution-architect",
        subtitle: "Conçoit l'architecture cible à partir des stories.",
        role: [
          "Event model et context map",
          "ADRs decisions structurelles",
          "Diagrammes et contrats d'interface"
        ],
        trigger: "DISCUSS approuve",
        does: "Produit event-model, ADR, diagrams, contracts",
        output: "Spec architecture actionnable",
        next: "Declenche solution-architect-reviewer"
      },
      {
        phase: "DESIGN",
        title: "Agent solution-architect-reviewer",
        subtitle: "Reviewer de phase (sans sous-agent): audite coherence, boundaries et fitness architecture.",
        role: [
          "Reviewer unique: pas de sous-agent lens",
          "Evalue directement les gates DESIGN",
          "Rend un verdict structure au niveau phase"
        ],
        trigger: "Reception des artefacts DESIGN",
        does: "Applique gates G1-G9",
        output: "Verdict design avec severite",
        next: "Orchestrateur boucle ou avance"
      },
      {
        phase: "DESIGN GATES",
        title: "Gates du solution-architect-reviewer",
        subtitle: "Cas sans sous-agent: les gates sont portees directement par le reviewer.",
        role: [
          "G1-G2: coherence et non-contradiction des ADR",
          "G3-G6: compliance Clean Architecture + DDD boundaries",
          "G7-G9: fitness story->events et anti-surdesign"
        ],
        trigger: "Juste apres l'introduction du reviewer",
        does: "Montre ce que controle chaque gate avant verdict",
        output: "Lecture claire des controles du reviewer DESIGN",
        next: "Phase DISTILL",
        gates: [
          ["G1", "Chaque element structurel des diagrammes est justifie par un ADR.", "high"],
          ["G2", "Aucune contradiction entre ADR (ou supersession explicite).", "blocker"],
          ["G3", "Regle de dependance: Domain/Application sans dependance sortante interdite.", "blocker"],
          ["G4", "Interfaces applicatives definies au bon niveau (Application).", "blocker"],
          ["G5", "Invariants respectes dans les aggregates (pas de cross-aggregate leak).", "high"],
          ["G6", "Context map complet avec relation explicite entre contexts.", "high"],
          ["G7", "Chaque story mappee a au moins une commande/evenement.", "high"],
          ["G8", "Chaque commande a un evenement associe (pas de dangling command).", "high"],
          ["G9", "Pas de sur-design sans justification metier (YAGNI architecture).", "medium"]
        ]
      },
      {
        phase: "DISTILL",
        title: "Agent acceptance-designer",
        subtitle: "Convertit les specs en scenarios BDD et plan d'implementation.",
        role: [
          "Ecriture .feature",
          "Test plan par layer",
          "Impl plan outside-in"
        ],
        trigger: "DESIGN approuve",
        does: "Produit feature + test-plan + impl-plan",
        output: "Artefacts DISTILL executables",
        next: "Declenche acceptance-designer-reviewer"
      },
      {
        phase: "DISTILL",
        title: "Agent acceptance-designer-reviewer",
        subtitle: "Verifie couverture AC, alignement metier et testabilite.",
        role: [
          "Coverage lens",
          "Business alignment lens",
          "Boundary enforcement lens"
        ],
        trigger: "Reception des artefacts DISTILL",
        does: "Applique gates G1-G8",
        output: "Verdict sur scenarios et plan",
        next: "Orchestrateur boucle ou avance"
      },
      {
        phase: "DELIVER",
        title: "Agent software-engineer",
        subtitle: "Livre le code via Outside-In TDD en 4 phases.",
        role: [
          "PREPARE -> RED -> SYNTHESIZE-GREEN -> COMMIT",
          "Respect Clean Architecture",
          "Journal + checklist quality gates"
        ],
        trigger: "DISTILL approuve",
        does: "Produit code, tests, commits, journal",
        output: "Implementation candidate",
        next: "Declenche software-engineer-reviewer"
      },
      {
        phase: "DELIVER",
        title: "Agent software-engineer-reviewer",
        subtitle: "Revue adversariale A7 avec synthese multi-lenses.",
        role: [
          "Fan-out sur 4 lenses",
          "Consolidation des defects",
          "Verdict final strict"
        ],
        trigger: "Reception des artefacts DELIVER",
        does: "Evalue G1..G11",
        output: "Verdict approved / changes_requested / rejected",
        next: "Orchestrateur boucle ou escalade",
        schemaSteps: [
          { k: "Declencheur", v: "Orchestrateur declenche la phase DELIVER" },
          { k: "Tentative 1/3", v: "software-engineer livre -> reviewer evalue" },
          { k: "Tentative 2/3", v: "Si changes_requested, correction engineer -> re-review" },
          { k: "Tentative 3/3", v: "Derniere correction -> dernier re-review" },
          { k: "Sortie", v: "approved -> suite ; rejected ou 3 echecs -> escalade humaine" }
        ]
      },
      {
        phase: "DELIVER GATES",
        title: "Gates du software-engineer-reviewer",
        subtitle: "Juste apres l'agent: la vue complete des controles utilises pour le verdict final.",
        role: [
          "Synthese de 4 subagents lens",
          "Classement par severite (blocker/high/medium/low)",
          "Verdict final et boucle 3 tentatives"
        ],
        trigger: "Juste apres l'introduction du software-engineer-reviewer",
        does: "Montre toutes les gates G1 a G11",
        output: "Perimetre de controle complet DELIVER",
        next: "Presentation detaillee des subagents lens",
        gates: [
          ["G1", "Les tests d'acceptation passent.", "blocker"],
          ["G2", "Les tests unitaires passent.", "blocker"],
          ["G3", "Le build passe.", "blocker"],
          ["G4", "Aucun mock dans Domain/Application.", "blocker"],
          ["G5", "Dependances Clean Architecture orientees vers l'interieur.", "blocker"],
          ["G6", "Score de mutation a 100% sur la logique metier.", "high"],
          ["G7", "Absence de test theater.", "blocker"],
          ["G8", "Conventional commit respecte.", "low"],
          ["G9", "Iron Rule respectee (pas d'affaiblissement de test).", "blocker"],
          ["G10", "Object Calisthenics sur le Domain.", "medium"],
          ["G11", "Langage metier lisible dans code/tests.", "medium"]
        ]
      },
      {
        phase: "LENS",
        title: "Subagent du reviewer: quality-gates-lens",
        subtitle: "Sous-agent de software-engineer-reviewer pour les preuves factuelles.",
        role: [
          "Tests acceptance/unit green",
          "Build green",
          "Mutation score et conventional commit"
        ],
        trigger: "Fan-out du software-engineer-reviewer",
        does: "Cherche evidence explicite dans les artefacts",
        output: "JSON defects quality-gates",
        next: "Slide suivante: gates utilisees par ce sous-agent"
      },
      {
        phase: "LENS GATES",
        title: "Gates du subagent quality-gates-lens",
        subtitle: "Detail immediat des controles utilises par le sous-agent.",
        role: [
          "Sous-agent declenche par software-engineer-reviewer",
          "Controle les preuves de build/tests/commit",
          "Absence d'evidence = defect"
        ],
        trigger: "Juste apres l'introduction de quality-gates-lens",
        does: "Montre ses gates d'evaluation",
        output: "Perimetre exact du sous-agent quality",
        next: "Retour vers la synthese reviewer",
        gates: [
          ["G1", "Controle que les tests d'acceptation passent.", "blocker"],
          ["G2", "Controle que tous les tests unitaires passent.", "blocker"],
          ["G3", "Controle que le build est vert.", "blocker"],
          ["G6", "Controle un score de mutation a 100% sur la logique metier.", "high"],
          ["G8", "Controle le format conventional commit.", "low"]
        ]
      },
      {
        phase: "LENS",
        title: "Subagent du reviewer: architecture-boundaries-lens",
        subtitle: "Sous-agent de software-engineer-reviewer pour les invariants architecture.",
        role: [
          "No mocks Domain/Application",
          "Dependencies inward",
          "Object Calisthenics Domain"
        ],
        trigger: "Fan-out du software-engineer-reviewer",
        does: "Analyse structure code/tests",
        output: "JSON defects architecture-boundaries",
        next: "Slide suivante: gates utilisees par ce sous-agent"
      },
      {
        phase: "LENS GATES",
        title: "Gates du subagent architecture-boundaries-lens",
        subtitle: "Detail immediat des controles architecture.",
        role: [
          "Sous-agent declenche par software-engineer-reviewer",
          "Controle boundaries et dependances",
          "Signale violations structurelles majeures"
        ],
        trigger: "Juste apres l'introduction de architecture-boundaries-lens",
        does: "Montre ses gates d'evaluation",
        output: "Perimetre exact du sous-agent architecture",
        next: "Retour vers la synthese reviewer",
        gates: [
          ["G4", "Controle l'absence de mocks dans Domain/Application.", "blocker"],
          ["G5", "Controle le sens des dependances (inward only).", "blocker"],
          ["G10", "Controle Object Calisthenics sur le Domain.", "medium"]
        ]
      },
      {
        phase: "LENS",
        title: "Subagent du reviewer: test-integrity-lens",
        subtitle: "Sous-agent de software-engineer-reviewer pour l'integrite des tests.",
        role: [
          "Tautological tests",
          "Mock-dominated tests",
          "Weakening/deletion de tests"
        ],
        trigger: "Fan-out du software-engineer-reviewer",
        does: "Analyse patterns anti-qualite dans les tests",
        output: "JSON defects test-integrity",
        next: "Slide suivante: gates utilisees par ce sous-agent"
      },
      {
        phase: "LENS GATES",
        title: "Gates du subagent test-integrity-lens",
        subtitle: "Detail immediat des controles d'integrite test.",
        role: [
          "Sous-agent declenche par software-engineer-reviewer",
          "Traque les faux verts et la triche TDD",
          "Deux gates critiques, severite blocker"
        ],
        trigger: "Juste apres l'introduction de test-integrity-lens",
        does: "Montre ses gates d'evaluation",
        output: "Perimetre exact du sous-agent test-integrity",
        next: "Retour vers la synthese reviewer",
        gates: [
          ["G7", "Controle l'absence de test theater (tautologie, mirroring, etc.).", "blocker"],
          ["G9", "Controle le respect de l'Iron Rule (pas d'affaiblissement de test).", "blocker"]
        ]
      },
      {
        phase: "LENS",
        title: "Subagent du reviewer: cold-reader-lens",
        subtitle: "Sous-agent de software-engineer-reviewer pour la clarte metier sans contexte de production.",
        role: [
          "Nommage des tests",
          "Intention des methodes",
          "Lisibilite business"
        ],
        trigger: "Fan-out du software-engineer-reviewer",
        does: "Lecture naive code+tests",
        output: "JSON defects cold-reader",
        next: "Slide suivante: gate utilisee par ce sous-agent"
      },
      {
        phase: "LENS GATES",
        title: "Gate du subagent cold-reader-lens",
        subtitle: "Detail immediat du controle de clarte metier.",
        role: [
          "Sous-agent declenche par software-engineer-reviewer",
          "Lecture naive sans contexte de production",
          "Severite max medium"
        ],
        trigger: "Juste apres l'introduction de cold-reader-lens",
        does: "Montre sa gate d'evaluation",
        output: "Perimetre exact du sous-agent cold-reader",
        next: "Retour vers la synthese reviewer",
        gates: [
          ["G11", "Controle la clarte du langage metier dans les tests et le code.", "medium"]
        ]
      },
      {
        phase: "Wrap-up",
        title: "Ce que la demo montre",
        subtitle: "Chaque agent est explicite, declencheable, et verifiable. Le workflow est visible de bout en bout.",
        role: [
          "Une slide = un agent = un schema",
          "L'orchestrateur garde le fil",
          "Les reviewers rendent la qualite mesurable"
        ],
        trigger: "Talk meetup / replay interne",
        does: "Explique role, trigger et handoff",
        output: "Audience comprend qui fait quoi",
        next: "Adoption SDLC agentique"
      }
    ];

    const deck = document.getElementById('deck');
    const dots = document.getElementById('dots');
    const counter = document.getElementById('counter');

    let index = 0;

    function renderSchema(s) {
      const steps = s.schemaSteps ?? [
        { k: "Declencheur", v: s.trigger },
        { k: "Agent", v: s.title },
        { k: "Ce qu'il fait", v: s.does },
        { k: "Ce qu'il declenche", v: s.next }
      ];

      return `
        <div class="panel">
          <div class="head"><span>Schema de declenchement</span><span>${s.phase}</span></div>
          <div class="body schema">
            ${steps.map((step, i) => `
              <div class="box"><span class="k">${step.k}</span><span class="v">${step.v}</span></div>
              ${i < steps.length - 1 ? '<div class="arrow">↓</div>' : ''}
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderGates(s) {
      if (!s.gates || !Array.isArray(s.gates) || s.gates.length === 0) return '';
      const gateListClass = s.gates.length >= 9
        ? 'gate-list gate-list--dense-3'
        : s.gates.length >= 6
          ? 'gate-list gate-list--dense-2'
          : 'gate-list';

      const severityLabel = (severity) => {
        const sev = (severity || '').toLowerCase();
        if (!sev) return { text: '', cls: '' };
        if (sev === 'blocker') return { text: 'BLOCKER · bloquant', cls: 'blocker' };
        return { text: `${sev.toUpperCase()} · non bloquant`, cls: 'non-blocker' };
      };

      return `
        <div class="panel">
          <div class="head"><span>Detail gates</span><span>${s.gates.length} controles</span></div>
          <div class="body ${gateListClass}">
            ${s.gates.map(([id, text, severity]) => {
              const meta = severityLabel(severity);
              return `
              <div class="gate-item">
                <span class="gate-id">${id}</span>
                <span class="gate-text">${text}${meta.text ? `<span class="gate-meta ${meta.cls}">${meta.text}</span>` : ''}</span>
              </div>
            `;}).join('')}
          </div>
        </div>
      `;
    }

    function renderSlide(s, i) {
      const el = document.createElement('section');
      const hasGates = Array.isArray(s.gates) && s.gates.length > 0;
      el.className = 'slide' + (i === 0 ? ' active' : '') + (hasGates ? ' has-gates' : '');
      const centerPanel = `
        <div class="panel">
          <div class="head"><span>Centrage agent</span><span>What it does</span></div>
          <div class="body">
            <ul>${s.role.map(x => `<li>${x}</li>`).join('')}</ul>
            <div class="legend">
              <span class="badge ok">Sortie: ${s.output}</span>
              <span class="badge warn">Phase: ${s.phase}</span>
            </div>
          </div>
        </div>
      `;

      if (hasGates) {
        el.innerHTML = `
          <div class="gate-slide">
            <div class="gate-header">
              <div class="gate-title">
                <span class="chip">${s.phase}</span>
                <h1>${s.title}</h1>
                <p class="subtitle">${s.subtitle}</p>
              </div>
              ${renderSchema(s)}
            </div>
            <div class="gate-body">
              <div class="gate-center">
                ${centerPanel}
              </div>
              <div class="gate-full">
                ${renderGates(s)}
              </div>
            </div>
          </div>
          <div class="footer">
            <span>SKRAFT · Documentation -> Slides</span>
            <span>Slide ${i + 1}</span>
          </div>
        `;
      } else {
        el.innerHTML = `
          <div class="left">
            <span class="chip">${s.phase}</span>
            <h1>${s.title}</h1>
            <p class="subtitle">${s.subtitle}</p>
            ${centerPanel}
          </div>
          <div class="right">${renderSchema(s)}</div>
          <div class="footer">
            <span>SKRAFT · Documentation -> Slides</span>
            <span>Slide ${i + 1}</span>
          </div>
        `;
      }
      return el;
    }

    function mount() {
      deck.innerHTML = '';
      dots.innerHTML = '';
      slides.forEach((s, i) => {
        deck.appendChild(renderSlide(s, i));
        const d = document.createElement('span');
        d.className = 'dot' + (i === index ? ' active' : '');
        dots.appendChild(d);
      });
      counter.textContent = `${index + 1} / ${slides.length}`;
    }

    function go(next) {
      const n = Math.max(0, Math.min(slides.length - 1, next));
      if (n === index) return;
      const all = deck.querySelectorAll('.slide');
      all[index].classList.remove('active');
      all[n].classList.add('active');
      index = n;
      const allDots = dots.querySelectorAll('.dot');
      allDots.forEach((d, i) => d.classList.toggle('active', i === index));
      counter.textContent = `${index + 1} / ${slides.length}`;
    }

    window.addEventListener('keydown', (e) => {
      if (["ArrowRight", "ArrowDown", "PageDown", " "].includes(e.key)) { e.preventDefault(); go(index + 1); }
      if (["ArrowLeft", "ArrowUp", "PageUp"].includes(e.key)) { e.preventDefault(); go(index - 1); }
      if (e.key === "Home") { e.preventDefault(); go(0); }
      if (e.key === "End") { e.preventDefault(); go(slides.length - 1); }
    });

    let touchX = null;
    window.addEventListener('touchstart', (e) => { touchX = e.touches[0].clientX; }, { passive: true });
    window.addEventListener('touchend', (e) => {
      if (touchX == null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 45) go(index + (dx < 0 ? 1 : -1));
      touchX = null;
    }, { passive: true });

    let wheelLock = false;
    window.addEventListener('wheel', (e) => {
      if (wheelLock) return;
      if (Math.abs(e.deltaY) < 26) return;
      wheelLock = true;
      go(index + (e.deltaY > 0 ? 1 : -1));
      setTimeout(() => { wheelLock = false; }, 280);
    }, { passive: true });

    mount();
  </script>
</body>
</html>
